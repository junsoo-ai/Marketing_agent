name: Daily Content Generation

on:
  schedule:
    - cron: '0 21 * * 1-5'  # 5pm EDT (Mon-Fri) = 21:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD). Leave blank for today.'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Set target date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "DATE=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            echo "DATE=$(TZ=America/New_York date -d '+1 day' +%Y-%m-%d)" >> $GITHUB_ENV
          fi
          echo "Target date: $DATE"

      - name: Generate daily content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          echo "Generating content for $DATE"
          node _scripts/generate.js "$DATE"

      - name: Commit generated content
        run: |
          git config user.name "ClyptAI Bot"
          git config user.email "bot@clyptai.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add "_content/$DATE/"
          git diff --staged --quiet && echo "No new content" || git commit -m "content: auto-generate Discord posts for $DATE"
          git push

      - name: Review and notify Slack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK }}
        run: node _scripts/notify-slack.js "$DATE"
